    const generateWithGemini = async (prompt) => {
      // Changed to the stable gemini-1.5-flash model which allows public API keys to connect.
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: "You are an expert urban planner and regional strategist helping develop the Negev region in Israel. Respond in professional Hebrew. Do not use markdown formatting like bolding with asterisks." }] }
      };
      for (let i = 0; i < 5; i++) {
        try {
          const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error('API Error');
          const data = await res.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "לא התקבלה תשובה מהמודל.";
        } catch (err) {
          if (i === 4) return "אירעה שגיאה בחיבור ל-AI. אנא בדוק אם הזנת מפתח API תקין בקוד המערכת.";

    // --- Custom Select Component ---
    function ProgramSelect({ programs, selectedId, onChange, disabledPrograms }) {
      const [isOpen, setIsOpen] = useState(false);
      const dropdownRef = useRef(null);
      const [hoveredProgram, setHoveredProgram] = useState(null);
      const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

      useEffect(() => {
        const handleClickOutside = (event) => { 
          if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
            setIsOpen(false); 
            setHoveredProgram(null);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const selectedProg = programs.find(p => p.id === selectedId);

      return (
        <div className="relative w-full" ref={dropdownRef}>
          <button type="button" onClick={() => { setIsOpen(!isOpen); setHoveredProgram(null); }} className="w-full p-3 border-2 border-slate-200 rounded-lg bg-white text-sm font-bold outline-none flex justify-between items-center focus:border-blue-500 hover:border-slate-300 transition-colors shadow-sm">
            <span className={selectedProg ? "text-slate-800" : "text-slate-400 font-medium"}>{selectedProg ? selectedProg.name : '-- בחר פרוגרמה --'}</span>
            <span className={`text-slate-400 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`}>▼</span>
          </button>
          
          {isOpen && (
            <div className="absolute top-full left-0 z-[100] w-full mt-2 bg-white border border-slate-200 rounded-xl shadow-2xl py-2 max-h-80 overflow-y-auto">
              <div className="px-5 py-3 hover:bg-slate-50 cursor-pointer text-sm text-slate-500 border-b border-slate-100 font-medium" onClick={() => { onChange(''); setIsOpen(false); setHoveredProgram(null); }}>-- בחר פרוגרמה --</div>
              {programs.map(p => {
                const isDisabled = disabledPrograms.includes(p.id);
                return (
                  <div 
                    key={p.id} 
                    className={`p-4 cursor-pointer border-b border-slate-50 transition-colors last:border-0 ${isDisabled ? 'opacity-40 cursor-not-allowed bg-slate-50' : 'hover:bg-blue-50'}`} 
                    onClick={() => { if (!isDisabled) { onChange(p.id); setIsOpen(false); setHoveredProgram(null); } }}
                    onMouseEnter={() => setHoveredProgram(p)}
                    onMouseLeave={() => setHoveredProgram(null)}
                    onMouseMove={(e) => setMousePos({ x: e.clientX, y: e.clientY })}
                  >
                    <div className="flex items-center gap-3 pointer-events-none">
                       <span className="w-3.5 h-3.5 rounded-full shadow-sm shrink-0 border border-black/10" style={{ backgroundColor: p.color }}></span>
                       <span className="font-bold text-slate-700 text-base">{p.name}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Portal Tooltip - escapes all overflow restrictions! */}
          {isOpen && hoveredProgram && hoveredProgram.description && !disabledPrograms.includes(hoveredProgram.id) && ReactDOM.createPortal(
            <div
              className="fixed z-[99999] w-64 p-4 bg-slate-800/95 backdrop-blur text-white text-xs rounded-xl shadow-2xl pointer-events-none border border-slate-700 leading-relaxed"
              style={{ top: mousePos.y + 15, left: Math.max(10, mousePos.x - 270) }}
              dir="rtl"
            >
              <strong className="block mb-1.5 text-blue-300 text-sm">{hoveredProgram.name}</strong>
              {hoveredProgram.description}
            </div>,
            document.body
          )}
        </div>
      );
    }

    function App() {
      const [appConfig, setAppConfig] = useState({ title: 'תכנון שדה התעופה בנגב', subtitle: 'מערכת שיתוף ציבור ומנהיגות מקומית', logoUrl: '', primaryColor: '#1e3a8a', adminPassword: '1234' });

      const [cities, setCities] = useState(DEFAULT_CITIES);
      const [programs, setPrograms] = useState(DEFAULT_PROGRAMS);
      const [responses, setResponses] = useState([]);
      const [user, setUser] = useState(null);
      const [surveyData, setSurveyData] = useState({ id: '', name: '', role: '', cityId: '', selectedPrograms: Array(5).fill({ programId: '', lat: null, lng: null, areaSqm: 0, paramValue: 0 }) });
      const [adminCodeInput, setAdminCodeInput] = useState('');
      const [adminError, setAdminError] = useState('');
      const [adminTab, setAdminTab] = useState('summary');
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null, isInfo: false });

      const confirmAction = (message, onConfirm, isInfo = false) => setConfirmDialog({ isOpen: true, message, onConfirm, isInfo });
      const closeConfirm = () => setConfirmDialog({ isOpen: false, message: '', onConfirm: null, isInfo: false });
      const executeConfirm = async () => { 
        const action = confirmDialog.onConfirm;
        closeConfirm();
        if (action) {
           await action();
        }
      };

      useEffect(() => {
        auth.signInAnonymously().catch(e => console.error("Auth error", e));
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const unsub = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('settings').doc('main')
          .onSnapshot((docSnap) => {
            if (docSnap.exists) {
              const data = docSnap.data();
              if (data.appConfig) setAppConfig(data.appConfig);
              if (data.cities) setCities(data.cities);
              if (data.programs) setPrograms(data.programs);
            }
          });
        return () => unsub();
      }, [user]);

      useEffect(() => {
        if (!user) return;
        const unsub = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('responses')
          .onSnapshot((snap) => {
            const res = [];
            snap.forEach(d => res.push({ id: d.id, ...d.data() }));
            setResponses(res.sort((a,b) => b.timestamp - a.timestamp));
          });
        return () => unsub();
      }, [user]);

      const saveSettingsToCloud = async () => {
        try {
          await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('settings').doc('main').set({ appConfig, cities, programs });
          confirmAction('ההגדרות, היישובים והפרוגרמות נשמרו בהצלחה בענן!', null, true);
        } catch(e) {
          console.error("Error saving settings:", e);
          confirmAction('אירעה שגיאה בשמירת הנתונים בענן: ' + e.message + '\n(יש לוודא הגדרת הרשאות קריאה וכתיבה ב-Firestore Rules)', null, true); 
        }
      };

      const submitSurvey = async () => {
        const newResponse = { ...surveyData, timestamp: Date.now() };
        try { 
          await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('responses').add(newResponse); 
          setView('thank_you');
        } catch(e) {
          console.error("Error submitting survey:", e);
          confirmAction('אירעה שגיאה בשליחת הסקר למסד הנתונים: ' + e.message + '\n(יש לוודא שהוגדרו הרשאות כתיבה ב-Firestore Rules)', null, true);
        }
      };

      const deleteResponse = (idToDelete) => {
        confirmAction('האם אתה בטוח שברצונך למחוק תגובה זו?', async () => {
          try { 
            await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('responses').doc(idToDelete).delete(); 
          } catch(e) {
            console.error("Error deleting response:", e);
            setTimeout(() => {
               confirmAction("שגיאה במחיקה ממסד הנתונים ב-Firebase: " + e.message + "\n(יש לעדכן את הרשאות ה-Rules של הפרויקט ל-allow read, write: if true;)", null, true);
            }, 300);
          }
        });
      };

      const handleEditSubmission = () => setView('survey');
      const resetSurvey = () => { setSurveyData({ id: '', name: '', role: '', cityId: '', selectedPrograms: Array(5).fill({ programId: '', lat: null, lng: null, areaSqm: 0, paramValue: 0 }) }); setView('survey'); };

      const exportToXLSX = () => {
        if (!window.XLSX) return;
        const exportData = responses.map(r => {
          const city = cities.find(c => c.id === r.cityId)?.name || 'לא ידוע';
          let row = { "שם משיב": r.name, "תפקיד": r.role, "רשות מקומית": city };
          r.selectedPrograms.forEach((p, idx) => {
            const prog = programs.find(pr => pr.id === p.programId);
            row[`עדיפות ${idx + 1} - פרוגרמה`] = prog ? prog.name : '';
            row[`עדיפות ${idx + 1} - שטח מבוקש (מ"ר)`] = p.areaSqm || '';
            row[`עדיפות ${idx + 1} - ${prog?.paramName || 'פרמטר'}`] = p.paramValue || '';
            row[`עדיפות ${idx + 1} - Lat`] = p.lat || '';
            row[`עדיפות ${idx + 1} - Lng`] = p.lng || '';
          });
          return row;
        });
        const worksheet = window.XLSX.utils.json_to_sheet(exportData);
        worksheet['!dir'] = 'rtl';
        const workbook = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(workbook, worksheet, "תשובות מנהיגים");
        window.XLSX.writeFile(workbook, "Airport_Survey_Responses.xlsx");
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800" dir="rtl">
          <header className="text-white p-4 shadow-md sticky top-0 z-50 transition-colors duration-300" style={{ backgroundColor: appConfig.primaryColor }}>
            <div className="max-w-7xl mx-auto flex justify-between items-center">
              <div className="flex items-center gap-4">
                {appConfig.logoUrl ? <img src={appConfig.logoUrl} alt="Logo" className="h-10 w-auto object-contain bg-white/10 p-1 rounded" /> : <Icons.Navigation className="w-8 h-8 transform -rotate-45 text-white/80" />}
                <div><h1 className="text-2xl font-bold flex items-center gap-2">{appConfig.title}</h1><p className="text-white/80 text-sm mt-1">{appConfig.subtitle}</p></div>
              </div>
              <div className="flex items-center gap-3">
              {view !== 'admin_login' && view !== 'admin_dashboard' && <button onClick={() => setView('admin_login')} className="text-white/90 hover:text-white flex items-center gap-2 text-sm bg-black/20 hover:bg-black/30 px-3 py-1.5 rounded-lg transition"><Icons.Settings className="w-4 h-4" /> ניהול</button>}
              {(view === 'admin_login' || view === 'admin_dashboard') && <button onClick={() => setView('survey')} className="text-white hover:text-white/80 flex items-center gap-2 text-sm font-medium bg-black/20 px-4 py-2 rounded-lg transition">חזרה לסקר</button>}
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto p-4 md:p-6 pb-24">
            {view === 'survey' && <SurveyForm appConfig={appConfig} surveyData={surveyData} setSurveyData={setSurveyData} cities={cities} programs={programs} onSubmit={submitSurvey} />}
            {view === 'thank_you' && (
              <div className="max-w-2xl mx-auto mt-12 bg-white p-8 rounded-2xl shadow-lg text-center border-t-4 border-green-500">
                <Icons.CheckCircle className="w-20 h-20 text-green-500 mx-auto mb-6" />
                <h2 className="text-2xl font-bold text-slate-800 mb-4">תודה רבה על השתתפותך בסקר לתכנון שדה התעופה החדש בנגב - צעד קטן בדרך לגרום לנגב להמריא</h2>
                <div className="mt-8 flex justify-center gap-4">
                  <button onClick={handleEditSubmission} className="flex items-center gap-2 px-6 py-3 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 font-medium transition"><Icons.Edit className="w-5 h-5" /> עריכת התגובה שלי</button>
                  <button onClick={resetSurvey} className="flex items-center gap-2 px-6 py-3 text-white rounded-lg font-medium transition hover:brightness-110 shadow-md" style={{ backgroundColor: appConfig.primaryColor }}>משיב חדש</button>
                </div>
              </div>
            )}
            {view === 'admin_login' && (
              <div className="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-md text-center">
                <Icons.Settings className="w-16 h-16 text-slate-300 mx-auto mb-4" />
                <h2 className="text-xl font-bold mb-6">כניסת מנהל מערכת</h2>
                <input type="password" placeholder="הזן סיסמה" className="w-full p-3 border rounded-lg mb-4 text-center text-lg focus:ring-2 focus:ring-blue-500 outline-none" value={adminCodeInput} onChange={(e) => setAdminCodeInput(e.target.value)} onKeyDown={(e) => { if(e.key === 'Enter') { if(adminCodeInput === appConfig.adminPassword) { setView('admin_dashboard'); setAdminError(''); setAdminCodeInput(''); } else { setAdminError('סיסמה שגויה'); } } }} />
                {adminError && <p className="text-red-500 mb-4 font-medium">{adminError}</p>}
                <button onClick={() => { if(adminCodeInput === appConfig.adminPassword) { setView('admin_dashboard'); setAdminError(''); setAdminCodeInput(''); } else { setAdminError('סיסמה שגויה'); } }} className="w-full text-white py-3 rounded-lg font-bold transition hover:brightness-110 shadow" style={{ backgroundColor: appConfig.primaryColor }}>היכנס</button>
              </div>
            )}
            {view === 'admin_dashboard' && <AdminDashboard appConfig={appConfig} setAppConfig={setAppConfig} cities={cities} setCities={setCities} programs={programs} setPrograms={setPrograms} responses={responses} exportToXLSX={exportToXLSX} deleteResponse={deleteResponse} saveSettings={saveSettingsToCloud} tab={adminTab} setTab={setAdminTab} confirmAction={confirmAction} />}
          </main>

          {confirmDialog.isOpen && (
            <div className="fixed inset-0 bg-slate-900/50 z-[9999] flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl" dir="rtl">
                <h3 className="text-xl font-bold mb-3 text-slate-800">הודעת מערכת</h3>
                <p className="text-slate-600 mb-6 whitespace-pre-wrap">{confirmDialog.message}</p>
                <div className="flex gap-3 justify-end">
                  {confirmDialog.isInfo ? <button onClick={closeConfirm} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold transition">אישור, הבנתי</button> : <><button onClick={closeConfirm} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-medium transition">ביטול</button><button onClick={executeConfirm} className="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg font-medium transition">כן, בצע</button></>}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- Survey Form Component ---
    function SurveyForm({ appConfig, surveyData, setSurveyData, cities, programs, onSubmit }) {
      const [activeRank, setActiveRank] = useState(null);
      const [aiFeedback, setAiFeedback] = useState('');
      const [isGeneratingAi, setIsGeneratingAi] = useState(false);
      const [pois, setPois] = useState([]);
      const [isFetchingPois, setIsFetchingPois] = useState(false);
      const [loadedCategoriesDisplay, setLoadedCategoriesDisplay] = useState('');

      const cityObj = cities.find(c => c.id === surveyData.cityId);
      const mapCenterLat = cityObj?.lat || 31.2518;
      const mapCenterLng = cityObj?.lng || 34.7913;

      useEffect(() => {
        if (activeRank === null) { setPois([]); setLoadedCategoriesDisplay(''); return; }
        const progId = surveyData.selectedPrograms[activeRank]?.programId;
        const prog = programs.find(p => p.id === progId);
        if (!prog || (!prog.poiCategory && !prog.poiCategory2)) { setPois([]); setLoadedCategoriesDisplay(''); return; }
        const catObj1 = POI_CATEGORIES.find(c => c.id === prog.poiCategory);
        const catObj2 = POI_CATEGORIES.find(c => c.id === prog.poiCategory2);
        if (!catObj1?.tags && !catObj2?.tags) { setPois([]); setLoadedCategoriesDisplay(''); return; }

        const labels = [];
        if (catObj1?.tags) labels.push(catObj1.label);
        if (catObj2?.tags) labels.push(catObj2.label);
        setLoadedCategoriesDisplay(labels.join(' + '));

        let isMounted = true;
        const fetchPoisFromOSM = async () => {
          setIsFetchingPois(true); setPois([]); 
          try {
            let queryNodes = '';
            if (catObj1?.tags) queryNodes += `nwr${catObj1.tags}(around:15000,${mapCenterLat},${mapCenterLng});`;
            if (catObj2?.tags) queryNodes += `nwr${catObj2.tags}(around:15000,${mapCenterLat},${mapCenterLng});`;
            if (!queryNodes) return;
            const query = `[out:json][timeout:15];(${queryNodes});out center;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Network response was not ok');
            const data = await res.json();
            if (!isMounted) return;
            const fetchedPois = data.elements.map(e => ({ lat: e.center ? e.center.lat : e.lat, lng: e.center ? e.center.lon : e.lon, name: e.tags?.['name:he'] || e.tags?.name || 'נקודת עניין', color: prog.color || appConfig.primaryColor })).filter(p => p.lat && p.lng);
            setPois(fetchedPois);
          } catch (err) {} finally { if (isMounted) setIsFetchingPois(false); }
        };
        fetchPoisFromOSM();
        return () => { isMounted = false; };
      }, [activeRank, surveyData.selectedPrograms[activeRank]?.programId, mapCenterLat, mapCenterLng, programs, appConfig.primaryColor]);

      const handleProgramSelect = (index, programId) => {
        const newSelected = [...surveyData.selectedPrograms];
        const prog = programs.find(p => p.id === programId);
        if (newSelected[index].programId !== programId) newSelected[index] = { programId, lat: null, lng: null, areaSqm: prog ? prog.minArea : 0, paramValue: prog ? prog.minParam : 0 };
        setSurveyData({ ...surveyData, selectedPrograms: newSelected });
      };

      const handleUpdateProgramParams = (index, field, value) => {
        const newSelected = [...surveyData.selectedPrograms];
        newSelected[index] = { ...newSelected[index], [field]: value };
        setSurveyData({ ...surveyData, selectedPrograms: newSelected });
      };

      const handleMapClick = (lat, lng) => {
        if (activeRank !== null && surveyData.selectedPrograms[activeRank].programId) {
          const newSelected = [...surveyData.selectedPrograms];
          newSelected[activeRank] = { ...newSelected[activeRank], lat, lng };
          setSurveyData({ ...surveyData, selectedPrograms: newSelected });
          setActiveRank(null);
        }
      };

      const handleGenerateAiFeedback = async () => {
        setIsGeneratingAi(true);
        const cityName = cities.find(c => c.id === surveyData.cityId)?.name || '';
        const selectedDetails = surveyData.selectedPrograms.map((p, i) => { const prog = programs.find(pr => pr.id === p.programId); return `${i+1}. ${prog?.name} (${p.areaSqm} מ"ר, ${p.paramValue} ${prog?.paramName})`; }).join('\n');
        const prompt = `אני ${surveyData.role} של העיר ${cityName}. במסגרת תכנון שדה התעופה החדש בנגב, בחרתי את 5 הפרוגרמות הבאות שיוקמו סמוך לעיר שלי:\n${selectedDetails}\n\nכתוב פסקה אחת קצרה (עד 4 משפטים), מקצועית ומעוררת השראה, המנתחת כיצד תמהיל זה יתרום לפיתוח הכלכלי והחברתי של ${cityName}. אל תוסיף הקדמות, פשוט ספק את הניתוח.`;
        const response = await generateWithGemini(prompt);
        setAiFeedback(response);
        setIsGeneratingAi(false);
      };

      const isFormValid = surveyData.name && surveyData.role && surveyData.cityId && surveyData.selectedPrograms.every(p => p.programId && p.lat && p.lng);

      return (
        <div className="flex flex-col-reverse lg:flex-row gap-8 items-start">
          <div className="w-full lg:w-5/12 space-y-6 shrink-0 relative z-20">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
              <h2 className="text-xl font-bold mb-4 border-b pb-2">1. פרטים אישיים</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label className="block text-sm font-medium text-slate-700 mb-1">שם מלא</label><input type="text" value={surveyData.name} onChange={e => setSurveyData({...surveyData, name: e.target.value})} className="w-full p-2.5 border rounded-lg bg-slate-50 focus:bg-white focus:ring-2 outline-none transition" style={{ '--tw-ring-color': appConfig.primaryColor }} placeholder="ישראל ישראלי" /></div>
                <div><label className="block text-sm font-medium text-slate-700 mb-1">תפקיד</label><input type="text" value={surveyData.role} onChange={e => setSurveyData({...surveyData, role: e.target.value})} className="w-full p-2.5 border rounded-lg bg-slate-50 focus:bg-white focus:ring-2 outline-none transition" style={{ '--tw-ring-color': appConfig.primaryColor }} placeholder="ראש מועצה / מהנדס עיר" /></div>
              </div>
              <div className="mt-4"><label className="block text-sm font-medium text-slate-700 mb-1">בחר/י רשות מקומית</label><select value={surveyData.cityId} onChange={e => setSurveyData({...surveyData, cityId: e.target.value})} className="w-full p-2.5 border rounded-lg bg-slate-50 focus:bg-white focus:ring-2 outline-none transition font-medium" style={{ '--tw-ring-color': appConfig.primaryColor }}><option value="">-- בחר רשות מהרשימה --</option>{cities.map(c => ( <option key={c.id} value={c.id}>{c.name}</option> ))}</select></div>
            </div>

            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative">
              <div className="flex justify-between items-center mb-4 border-b pb-2"><h2 className="text-xl font-bold">2. דירוג ומיקום פרוגרמות</h2><span className="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded-full font-semibold">5 נדרשים</span></div>
              <p className="text-sm text-slate-600 mb-6">אנא בחר את 5 הפרוגרמות שהכי חשוב לך שיהיו בתחום הרשות שלך, ומקם אותן על גבי המפה הכללית. השטח המוגדר ישנה את גודל ההשפעה על המפה!</p>

              <div className="space-y-5 relative">
                {[0, 1, 2, 3, 4].map(index => {
                  const selectedP = surveyData.selectedPrograms[index];
                  const progData = programs.find(p => p.id === selectedP.programId);
                  const isActive = activeRank === index;
                  const hasPlaced = selectedP.lat !== null;
                  const disabledProgIds = surveyData.selectedPrograms.map((sp, i) => i !== index ? sp.programId : null).filter(Boolean);
                  const zIndexValue = 50 - index;

                  return (
                    <div key={index} className={`p-4 rounded-xl border-2 transition-all relative ${isActive ? 'shadow-md scale-[1.02]' : 'bg-slate-50 border-slate-100'}`} style={{ borderColor: isActive ? (progData?.color || appConfig.primaryColor) : '', zIndex: zIndexValue }}>
                      <div className="flex flex-col md:flex-row gap-3 items-start md:items-center">
                        <div className="flex-1 w-full relative z-10"><label className="text-xs font-bold text-slate-500 mb-1 flex items-center gap-1"><span className="w-5 h-5 rounded-full text-xs text-white flex items-center justify-center font-bold" style={{ backgroundColor: progData?.color || '#cbd5e1' }}>{index+1}</span> עדיפות {index + 1}</label><ProgramSelect programs={programs} selectedId={selectedP.programId} onChange={(val) => handleProgramSelect(index, val)} disabledPrograms={disabledProgIds} /></div>
                        <button onClick={() => setActiveRank(isActive ? null : index)} disabled={!selectedP.programId} className={`w-full md:w-auto mt-2 md:mt-6 px-4 py-3 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition shadow-sm`} style={{ backgroundColor: !selectedP.programId ? '#e2e8f0' : (hasPlaced && !isActive ? '#dcfce7' : (isActive ? (progData?.color || appConfig.primaryColor) : '#f1f5f9')), color: !selectedP.programId ? '#94a3b8' : (hasPlaced && !isActive ? '#166534' : (isActive ? '#ffffff' : '#475569')) }}><Icons.MapPin className="w-4 h-4" />{hasPlaced && !isActive ? 'שנה מיקום' : (isActive ? 'לחץ במפה...' : 'מקם במפה')}</button>
                      </div>
                      {selectedP.programId && progData && (
                        <div className="mt-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-5">
                          <div><div className="flex justify-between text-xs text-slate-600 mb-2"><span className="font-bold">שטח מבוקש (מ"ר)</span><span className="font-bold text-lg" style={{ color: progData.color }}>{selectedP.areaSqm.toLocaleString()} מ"ר</span></div><input type="range" min={progData.minArea} max={progData.maxArea} step={1000} value={selectedP.areaSqm} onChange={(e) => handleUpdateProgramParams(index, 'areaSqm', Number(e.target.value))} className="w-full h-2.5 bg-slate-200 rounded-lg appearance-none cursor-pointer" style={{ accentColor: progData.color }} /><div className="flex justify-between text-xs text-slate-400 mt-1 font-medium"><span>{progData.minArea.toLocaleString()}</span><span>{progData.maxArea.toLocaleString()}</span></div></div>
                          {progData.paramName && <div><div className="flex justify-between text-xs text-slate-600 mb-2"><span className="font-bold">{progData.paramName}</span><span className="font-bold text-lg" style={{ color: progData.color }}>{selectedP.paramValue.toLocaleString()}</span></div><input type="range" min={progData.minParam} max={progData.maxParam} step={1} value={selectedP.paramValue} onChange={(e) => handleUpdateProgramParams(index, 'paramValue', Number(e.target.value))} className="w-full h-2.5 bg-slate-200 rounded-lg appearance-none cursor-pointer" style={{ accentColor: progData.color }} /><div className="flex justify-between text-xs text-slate-400 mt-1 font-medium"><span>{progData.minParam.toLocaleString()}</span><span>{progData.maxParam.toLocaleString()}</span></div></div>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {isFormValid && (
              <div className="bg-gradient-to-r from-blue-50 to-indigo-50 p-6 rounded-2xl shadow-sm border border-blue-100 mb-6">
                <h3 className="text-lg font-bold text-blue-900 mb-2 flex items-center gap-2"><Icons.Sparkles className="w-5 h-5 text-blue-600" />חוות דעת תכנונית (AI)</h3>
                <p className="text-sm text-slate-600 mb-4">רגע לפני ההגשה, קבל ניתוח אסטרטגי מהיר מבוסס בינה מלאכותית על הבחירות שעשית עבור העיר שלך.</p>
                {aiFeedback ? <div className="bg-white p-4 rounded-xl text-sm text-slate-700 leading-relaxed border border-blue-100 shadow-sm whitespace-pre-wrap font-medium">{aiFeedback}</div> : <button onClick={handleGenerateAiFeedback} disabled={isGeneratingAi} className="w-full py-3 rounded-xl font-bold text-sm bg-white border-2 border-blue-200 text-blue-700 hover:bg-blue-50 hover:border-blue-300 transition flex justify-center items-center gap-2 shadow-sm disabled:opacity-50">{isGeneratingAi ? <Icons.Loader2 className="w-5 h-5 animate-spin" /> : <Icons.Sparkles className="w-5 h-5" />}{isGeneratingAi ? 'מנתח נתונים...' : '✨ קבל חוות דעת תכנונית מותאמת אישית'}</button>}
              </div>
            )}
            <button onClick={onSubmit} disabled={!isFormValid} className={`w-full py-5 rounded-xl font-bold text-xl transition flex justify-center items-center gap-2 shadow-lg ${!isFormValid && 'opacity-50 cursor-not-allowed'}`} style={{ backgroundColor: isFormValid ? appConfig.primaryColor : '#cbd5e1', color: isFormValid ? 'white' : '#64748b' }}>{isFormValid ? 'אישור ושליחת הסקר' : 'אנא מלא את כל השדות ומקם על המפה'}</button>
          </div>

          <div className="w-full lg:w-7/12 h-[50vh] lg:h-[calc(100vh-120px)] lg:sticky lg:top-24 rounded-2xl overflow-hidden shadow-lg border-4 border-white relative z-10 flex-shrink-0">
            {!surveyData.cityId && <div className="absolute inset-0 bg-white/80 backdrop-blur-sm z-[1000] flex flex-col items-center justify-center text-center p-8"><Icons.MapIcon className="w-20 h-20 text-slate-300 mb-6" /><h3 className="text-2xl font-bold text-slate-800 mb-2">בחר רשות מקומית</h3><p className="text-slate-500 max-w-sm">המפה תתמקד אוטומטית ביישוב שלך לאחר הבחירה, ותוכל להתחיל למקם את הפרוגרמות השונות במרחב.</p></div>}
            <LeafletMap centerLat={mapCenterLat} centerLng={mapCenterLng} zoom={surveyData.cityId ? 13 : 9} onClick={handleMapClick} interactiveCursor={activeRank !== null} markers={surveyData.selectedPrograms.map((p, idx) => { if (!p.lat) return null; const prog = programs.find(pr => pr.id === p.programId); return { lat: p.lat, lng: p.lng, rank: idx + 1, radius: p.areaSqm ? Math.sqrt(p.areaSqm / Math.PI) : 100, name: prog?.name, color: prog?.color || appConfig.primaryColor }; }).filter(Boolean)} pois={pois} />
            {activeRank !== null && <div className="absolute top-4 right-4 z-[1000] text-white px-5 py-3 rounded-xl shadow-2xl font-bold flex flex-col gap-1 border-2 border-white/20 animate-pulse" style={{ backgroundColor: programs.find(p => p.id === surveyData.selectedPrograms[activeRank].programId)?.color || appConfig.primaryColor }}><div className="flex items-center gap-3 text-lg"><Icons.MapPin className="w-6 h-6" /> לחץ על המפה לנעיצת עדיפות {activeRank + 1} <button onClick={() => setActiveRank(null)} className="mr-6 hover:bg-black/20 p-1.5 rounded-full transition"><Icons.X className="w-5 h-5" /></button></div></div>}
            {activeRank !== null && loadedCategoriesDisplay && <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-[1000] bg-white/95 backdrop-blur shadow-xl rounded-full px-5 py-2.5 flex items-center gap-3 border border-slate-200 whitespace-nowrap">{isFetchingPois ? ( <><Icons.Loader2 className="w-5 h-5 text-blue-500 animate-spin" /><span className="text-sm font-bold text-slate-700">טוען נתוני רקע...</span></> ) : ( <><Icons.MapPinned className="w-5 h-5 text-emerald-500" /><span className="text-sm font-bold text-slate-700">רקע: {loadedCategoriesDisplay} ({pois.length})</span></> )}</div>}
          </div>
        </div>
      );
    }

    // --- Admin Dashboard Component ---
    function AdminDashboard({ appConfig, setAppConfig, cities, setCities, programs, setPrograms, responses, exportToXLSX, deleteResponse, saveSettings, tab, setTab, confirmAction }) {
      const [aiSummary, setAiSummary] = useState('');
      const [isGeneratingSummary, setIsGeneratingSummary] = useState(false);
      
      const handleUpdateCity = (id, field, value) => setCities(cities.map(c => c.id === id ? { ...c, [field]: value } : c));
      const handleUpdateProgram = (id, field, value) => setPrograms(programs.map(p => p.id === id ? { ...p, [field]: ['minArea', 'maxArea', 'minParam', 'maxParam'].includes(field) ? Number(value) : value } : p));

      const handleGenerateAiSummary = async () => {
        setIsGeneratingSummary(true);
        const dataStr = responses.map(r => {
          const cName = cities.find(c => c.id === r.cityId)?.name;
          const progs = r.selectedPrograms.map(p => programs.find(pr => pr.id === p.programId)?.name).join(', ');
          return `משיב: ${r.role} מ${cName}. בחירות: ${progs}`;
        }).join('\n');
        let prompt = `לפניך נתונים של סקר מנהיגים מקומיים בנוגע לתכנון שדה תעופה בנגב. הנתונים:\n${dataStr}\n\nאנא ספק "דוח מנהלים" קצר הכולל:\n1. מגמות בולטות בבחירת הפרוגרמות.\n2. תובנה אסטרטגית מעניינת שעולה מהנתונים.`;
        if (responses.length === 0) prompt = "כתוב הודעה שאין עדיין מספיק נתונים בסקר כדי לייצר דוח מנהלים סטטיסטי משמעותי.";
        const response = await generateWithGemini(prompt);
        setAiSummary(response);
        setIsGeneratingSummary(false);
      };

      return (
        <div className="bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden min-h-[750px] flex flex-col md:flex-row">
          <div className="w-full md:w-64 text-white p-6 flex flex-col gap-3 shrink-0" style={{ backgroundColor: '#0f172a' }}>
            <h2 className="text-xl font-bold mb-6 mt-2 px-2 text-white/80">פאנל ניהול</h2>
            <button onClick={() => setTab('summary')} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition text-right font-medium ${tab === 'summary' ? 'bg-white/20 shadow-inner' : 'hover:bg-white/10'}`}><Icons.BarChart2 className="w-5 h-5" /> סיכום תשובות ({responses.length})</button>
            <button onClick={() => setTab('map')} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition text-right font-medium ${tab === 'map' ? 'bg-white/20 shadow-inner' : 'hover:bg-white/10'}`}><Icons.MapIcon className="w-5 h-5" /> מפה מתכללת</button>
            <button onClick={() => setTab('cities')} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition text-right font-medium ${tab === 'cities' ? 'bg-white/20 shadow-inner' : 'hover:bg-white/10'}`}><Icons.MapPin className="w-5 h-5" /> ניהול יישובים</button>
            <button onClick={() => setTab('programs')} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition text-right font-medium ${tab === 'programs' ? 'bg-white/20 shadow-inner' : 'hover:bg-white/10'}`}><Icons.List className="w-5 h-5" /> ניהול פרוגרמות</button>
            <button onClick={() => setTab('settings')} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition text-right font-medium ${tab === 'settings' ? 'bg-white/20 shadow-inner' : 'hover:bg-white/10'}`}><Icons.Settings className="w-5 h-5" /> הגדרות סקר</button>
            <div className="mt-auto pt-6 border-t border-white/10 space-y-3">
              <button onClick={saveSettings} className="w-full flex justify-center items-center gap-2 px-4 py-4 rounded-xl transition font-bold text-white shadow-lg bg-emerald-600 hover:bg-emerald-500"><Icons.CloudUpload className="w-5 h-5" /> שמור הגדרות לענן</button>
              <button onClick={exportToXLSX} className="w-full flex justify-center items-center gap-2 px-4 py-4 rounded-xl transition font-bold text-white shadow hover:brightness-110" style={{ backgroundColor: appConfig.primaryColor }}><Icons.Download className="w-5 h-5" /> ייצוא Excel (XLSX)</button>
            </div>
          </div>

          <div className="flex-1 p-8 overflow-y-auto bg-slate-50/50">
            {tab === 'summary' && (
              <div>
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-3xl font-bold text-slate-800">תשובות אחרונות</h3>
                  <button onClick={handleGenerateAiSummary} disabled={isGeneratingSummary || responses.length === 0} className="flex items-center gap-2 bg-indigo-100 text-indigo-700 px-5 py-3 rounded-xl font-bold hover:bg-indigo-200 transition disabled:opacity-50 shadow-sm">{isGeneratingSummary ? <Icons.Loader2 className="w-5 h-5 animate-spin" /> : <Icons.Sparkles className="w-5 h-5" />} ✨ הפק דוח מנהלים חכם (AI)</button>
                </div>
                {aiSummary && <div className="mb-8 bg-indigo-50 p-6 rounded-2xl border border-indigo-100 shadow-sm text-sm text-slate-800" dir="rtl"><h4 className="font-bold text-indigo-900 mb-3 flex items-center gap-2 text-base"><Icons.Sparkles className="w-5 h-5" /> סיכום ותובנות בינה מלאכותית (Gemini)</h4><div className="whitespace-pre-wrap leading-relaxed text-base">{aiSummary}</div></div>}
                {responses.length === 0 ? (
                  <div className="text-center text-slate-500 py-20 bg-white rounded-2xl border border-dashed border-slate-300"><Icons.BarChart2 className="w-16 h-16 mx-auto mb-4 text-slate-300" /><p className="text-lg">טרם התקבלו תגובות לסקר.</p></div>
                ) : (
                  <div className="overflow-x-auto bg-white rounded-2xl shadow-sm border border-slate-200">
                    <table className="w-full text-sm text-right">
                      <thead className="bg-slate-100 text-slate-700 border-b"><tr><th className="p-4 font-bold">שם משיב ותפקיד</th><th className="p-4 font-bold">רשות מקומית</th><th className="p-4 font-bold">בחירות ופירוט (לפי צבעים)</th><th className="p-4 font-bold text-center">פעולות</th></tr></thead>
                      <tbody>
                        {responses.map((r, i) => (
                          <tr key={i} className="border-b hover:bg-slate-50 transition">
                            <td className="p-4 align-top"><div className="font-bold text-base text-slate-800">{r.name}</div><div className="text-slate-500">{r.role}</div></td>
                            <td className="p-4 align-top font-medium text-slate-700">{cities.find(c => c.id === r.cityId)?.name}</td>
                            <td className="p-4">
                              <div className="flex flex-col gap-2">
                                {r.selectedPrograms.map((p, pIdx) => {
                                  const prog = programs.find(pr => pr.id === p.programId);
                                  return prog ? (
                                    <div key={pIdx} className="inline-flex items-center gap-2 border rounded-lg px-3 py-1.5 bg-white shadow-sm w-fit" style={{ borderColor: prog.color }}><span className="w-5 h-5 rounded-full text-white text-xs flex items-center justify-center font-bold" style={{ backgroundColor: prog.color }}>{pIdx+1}</span><span className="font-bold">{prog.name}</span><span className="text-slate-400 mx-1">|</span><span className="text-slate-600">{p.areaSqm.toLocaleString()} מ"ר</span><span className="text-slate-400 mx-1">|</span><span className="text-slate-600">{p.paramValue.toLocaleString()} {prog.paramName}</span></div>
                                  ) : null;
                                })}
                              </div>
                            </td>
                            <td className="p-4 align-top text-center"><button onClick={() => deleteResponse(r.id)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition" title="מחק תגובה"><Icons.Trash2 className="w-5 h-5" /></button></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            )}

            {tab === 'map' && (
              <div className="h-full flex flex-col min-h-[600px]">
                <h3 className="text-3xl font-bold mb-6 text-slate-800">מפה מתכללת - תצוגת מנהלים</h3>
                <div className="flex-1 rounded-2xl overflow-hidden shadow-lg border-4 border-white">
                  <LeafletMap centerLat={31.2518} centerLng={34.7913} zoom={9} markers={responses.flatMap(r => r.selectedPrograms.map((p, idx) => { if (!p.lat) return null; const prog = programs.find(pr => pr.id === p.programId); return { lat: p.lat, lng: p.lng, rank: idx + 1, radius: p.areaSqm ? Math.sqrt(p.areaSqm / Math.PI) : 100, name: `${prog?.name} (${r.name}, ${cities.find(c=>c.id === r.cityId)?.name})`, color: prog?.color || appConfig.primaryColor }; }).filter(Boolean))} pois={[]} />
                </div>
              </div>
            )}

            {tab === 'cities' && (
              <div>
                <h3 className="text-3xl font-bold mb-6 text-slate-800">רשימת יישובים</h3>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  {cities.map(city => (
                    <div key={city.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition">
                      <div className="flex justify-between items-start mb-4 gap-3"><input className="font-bold text-xl w-full p-2 border-b-2 border-slate-100 focus:border-blue-500 outline-none transition bg-transparent" value={city.name} onChange={(e) => handleUpdateCity(city.id, 'name', e.target.value)} /><button type="button" onClick={(e) => { e.preventDefault(); confirmAction('האם אתה בטוח שברצונך למחוק יישוב זה?', () => { setCities(prevCities => prevCities.filter(c => c.id !== city.id)); }); }} className="p-2.5 text-slate-400 hover:text-red-500 bg-slate-50 hover:bg-red-50 rounded-xl transition shrink-0 mt-1" title="מחק יישוב"><Icons.Trash2 className="w-5 h-5" /></button></div>
                      <div className="flex gap-4">
                        <div className="flex-1"><label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Lat</label><input type="number" step="0.0001" className="w-full p-2.5 bg-slate-50 border rounded-lg text-sm text-left font-mono mt-1" dir="ltr" value={city.lat} onChange={(e) => handleUpdateCity(city.id, 'lat', parseFloat(e.target.value))} /></div>
                        <div className="flex-1"><label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Lng</label><input type="number" step="0.0001" className="w-full p-2.5 bg-slate-50 border rounded-lg text-sm text-left font-mono mt-1" dir="ltr" value={city.lng} onChange={(e) => handleUpdateCity(city.id, 'lng', parseFloat(e.target.value))} /></div>
                      </div>
                    </div>
                  ))}
                  <button onClick={() => setCities([...cities, { id: Date.now().toString(), name: 'יישוב חדש', lat: 31.0, lng: 35.0 }])} className="bg-slate-50 border-2 border-dashed border-slate-300 text-slate-500 rounded-2xl p-4 flex flex-col items-center justify-center hover:bg-slate-100 hover:border-slate-400 transition min-h-[160px]"><Icons.Settings className="w-8 h-8 mb-2 opacity-50" /><span className="font-bold">הוסף יישוב</span></button>
                </div>
              </div>
            )}

            {tab === 'programs' && (
              <div>
                <h3 className="text-3xl font-bold mb-6 text-slate-800">מאגר פרוגרמות וצבעים</h3>
                <div className="space-y-6">
                  {programs.map(prog => (
                    <div key={prog.id} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row gap-6 relative overflow-hidden">
                      <div className="absolute right-0 top-0 bottom-0 w-2" style={{ backgroundColor: prog.color || '#cbd5e1' }}></div>
                      <div className="flex-1 space-y-4">
                        <div className="flex justify-between items-start gap-4">
                           <div className="flex-1 pl-4"><label className="text-xs font-bold text-slate-500">שם הפרוגרמה</label><input className="w-full font-bold text-xl p-2 border-b-2 border-slate-100 outline-none focus:border-blue-500 transition" value={prog.name} onChange={(e) => handleUpdateProgram(prog.id, 'name', e.target.value)} /></div>
                           <button type="button" onClick={(e) => { e.preventDefault(); confirmAction('האם אתה בטוח שברצונך למחוק פרוגרמה זו?', () => { setPrograms(prevPrograms => prevPrograms.filter(p => p.id !== prog.id)); }); }} className="p-2.5 text-slate-400 hover:text-red-500 bg-slate-50 hover:bg-red-50 rounded-xl transition shrink-0" title="מחק פרוגרמה"><Icons.Trash2 className="w-5 h-5" /></button>
                        </div>
                        <div className="pl-4"><label className="text-xs font-bold text-slate-500">תיאור הפרוגרמה (מוצג למשיב בעת בחירה - עד 200 תווים)</label><textarea className="w-full p-2.5 border rounded-lg bg-slate-50 mt-1 resize-none text-sm outline-none focus:border-blue-500 transition" rows="2" maxLength="200" placeholder="הזן תיאור קצר..." value={prog.description || ''} onChange={(e) => handleUpdateProgram(prog.id, 'description', e.target.value)} /></div>
                        <div className="flex flex-col lg:flex-row items-start gap-4 p-4 bg-blue-50/50 rounded-xl border border-blue-100">
                          <div className="flex-1 w-full grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label className="text-xs font-bold text-slate-500 flex items-center gap-1"><Icons.MapPinned className="w-3 h-3"/> שכבת רקע ראשית (POI)</label><select className="w-full p-2.5 border rounded-lg bg-white text-sm outline-none mt-1" value={prog.poiCategory || ''} onChange={(e) => handleUpdateProgram(prog.id, 'poiCategory', e.target.value)}>{POI_CATEGORIES.map(cat => ( <option key={cat.id} value={cat.id}>{cat.label}</option> ))}</select></div>
                            <div><label className="text-xs font-bold text-slate-500 flex items-center gap-1"><Icons.MapPinned className="w-3 h-3"/> שכבת רקע משנית (POI)</label><select className="w-full p-2.5 border rounded-lg bg-white text-sm outline-none mt-1" value={prog.poiCategory2 || ''} onChange={(e) => handleUpdateProgram(prog.id, 'poiCategory2', e.target.value)}>{POI_CATEGORIES.map(cat => ( <option key={cat.id} value={cat.id}>{cat.label}</option> ))}</select></div>
                          </div>
                          <div className="w-full lg:w-48 flex flex-col gap-1"><label className="text-xs font-bold text-slate-500">צבע מפה</label><div className="flex items-center gap-2"><input type="color" className="w-12 h-10 p-1 border rounded cursor-pointer shrink-0 bg-white" value={prog.color || '#000000'} onChange={(e) => handleUpdateProgram(prog.id, 'color', e.target.value)} /><input type="text" className="w-full p-2 border rounded-lg text-sm font-mono text-center outline-none focus:border-blue-500 bg-white" value={prog.color || '#000000'} onChange={(e) => handleUpdateProgram(prog.id, 'color', e.target.value)} dir="ltr" /></div></div>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
                          <div><label className="text-xs font-bold text-slate-500">שטח מינ' (מ"ר)</label><input type="number" className="w-full p-2 border rounded-lg bg-white text-left mt-1" dir="ltr" value={prog.minArea} onChange={(e) => handleUpdateProgram(prog.id, 'minArea', e.target.value)} /></div>
                          <div><label className="text-xs font-bold text-slate-500">שטח מקס' (מ"ר)</label><input type="number" className="w-full p-2 border rounded-lg bg-white text-left mt-1" dir="ltr" value={prog.maxArea} onChange={(e) => handleUpdateProgram(prog.id, 'maxArea', e.target.value)} /></div>
                          <div className="col-span-2 md:col-span-4 grid grid-cols-2 md:grid-cols-4 gap-4 pt-4 border-t border-slate-200 mt-2">
                             <div className="col-span-2"><label className="text-xs font-bold text-slate-500">שם פרמטר (כיתות, מיטות...)</label><input className="w-full p-2 border rounded-lg bg-white mt-1" value={prog.paramName} onChange={(e) => handleUpdateProgram(prog.id, 'paramName', e.target.value)} /></div>
                             <div><label className="text-xs font-bold text-slate-500">מינ' פרמטר</label><input type="number" className="w-full p-2 border rounded-lg bg-white text-left mt-1" dir="ltr" value={prog.minParam} onChange={(e) => handleUpdateProgram(prog.id, 'minParam', e.target.value)} /></div>
                             <div><label className="text-xs font-bold text-slate-500">מקס' פרמטר</label><input type="number" className="w-full p-2 border rounded-lg bg-white text-left mt-1" dir="ltr" value={prog.maxParam} onChange={(e) => handleUpdateProgram(prog.id, 'maxParam', e.target.value)} /></div>
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                  <button onClick={() => setPrograms([...programs, { id: 'p'+Date.now(), name: 'פרוגרמה חדשה', minArea: 1000, maxArea: 50000, paramName: 'יחידות', minParam: 1, maxParam: 100, color: '#94a3b8', poiCategory: '', poiCategory2: '', description: '' }])} className="w-full py-5 border-2 border-dashed border-slate-300 text-slate-500 rounded-2xl font-bold text-lg hover:bg-slate-100 hover:border-slate-400 transition">+ הוסף פרוגרמה חדשה לרשימה</button>
                </div>
              </div>
            )}

            {tab === 'settings' && (
              <div className="max-w-2xl">
                <h3 className="text-3xl font-bold mb-6 text-slate-800">הגדרות מערכת</h3>
                <div className="space-y-8 bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                  <div>
                    <h4 className="font-bold text-lg border-b pb-2 mb-4">מיתוג ותצוגה</h4>
                    <div className="space-y-4">
                      <div><label className="block text-sm font-bold text-slate-700 mb-1">כותרת הסקר</label><input type="text" value={appConfig.title} onChange={(e) => setAppConfig({...appConfig, title: e.target.value})} className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50 focus:bg-white" /></div>
                      <div><label className="block text-sm font-bold text-slate-700 mb-1">כותרת משנית / תיאור</label><input type="text" value={appConfig.subtitle} onChange={(e) => setAppConfig({...appConfig, subtitle: e.target.value})} className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50 focus:bg-white" /></div>
                      <div className="flex gap-4 items-end">
                        <div className="flex-1">
                           <label className="block text-sm font-bold text-slate-700 mb-1">צבע ראשי (Header וכפתורים)</label>
                           <div className="flex items-center gap-3">
                              <input type="color" value={appConfig.primaryColor} onChange={(e) => setAppConfig({...appConfig, primaryColor: e.target.value})} className="h-12 w-20 p-1 border rounded-lg cursor-pointer" />
                              <span className="text-sm font-mono text-slate-500" dir="ltr">{appConfig.primaryColor}</span>
                           </div>
                        </div>
                      </div>
                      <div><label className="block text-sm font-bold text-slate-700 mb-1">קישור ללוגו (URL)</label><input type="text" placeholder="https://example.com/logo.png" value={appConfig.logoUrl} onChange={(e) => setAppConfig({...appConfig, logoUrl: e.target.value})} className="w-full p-3 border rounded-xl text-left focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 focus:bg-white transition" dir="ltr" /></div>
                      {appConfig.logoUrl && <div className="p-4 border rounded-xl bg-slate-50 flex flex-col items-center"><p className="text-sm text-slate-500 mb-3">תצוגה מקדימה ללוגו:</p><div className="p-2 rounded bg-slate-800" style={{ backgroundColor: appConfig.primaryColor }}><img src={appConfig.logoUrl} alt="Preview" className="h-12 object-contain" onError={(e) => e.target.style.display = 'none'} /></div></div>}
                    </div>
                  </div>
                  <div>
                    <h4 className="font-bold text-lg border-b pb-2 mb-4">אבטחה</h4>
                    <div><label className="block text-sm font-bold text-slate-700 mb-1">סיסמת מנהל (לכניסה לפאנל זה)</label><input type="text" value={appConfig.adminPassword} onChange={(e) => setAppConfig({...appConfig, adminPassword: e.target.value})} className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition bg-slate-50 focus:bg-white font-mono" /><p className="text-xs text-slate-500 mt-2">סיסמה זו תשמש אותך לכניסות הבאות. מומלץ לשמור אותה במקום בטוח.</p></div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- Vanilla Leaflet Map Wrapper ---
    function LeafletMap({ centerLat, centerLng, zoom, onClick, interactiveCursor, markers, pois = [] }) {
      const mapRef = useRef(null);
      const mapInstance = useRef(null);
      const layerGroup = useRef(null);
      const poiLayerGroup = useRef(null);
      const onClickRef = useRef(onClick);

      useEffect(() => { onClickRef.current = onClick; }, [onClick]);

      useEffect(() => {
        if (!window.L || !mapRef.current) return;
        if (!mapInstance.current) {
          mapInstance.current = L.map(mapRef.current).setView([centerLat, centerLng], zoom);
          L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 20 }).addTo(mapInstance.current);
          layerGroup.current = L.layerGroup().addTo(mapInstance.current);
          poiLayerGroup.current = L.layerGroup().addTo(mapInstance.current);
          mapInstance.current.on('click', (e) => { if (onClickRef.current) onClickRef.current(e.latlng.lat, e.latlng.lng); });
        } else {
          const currentCenter = mapInstance.current.getCenter();
          if (Math.abs(currentCenter.lat - centerLat) > 0.0001 || Math.abs(currentCenter.lng - centerLng) > 0.0001) {
            mapInstance.current.flyTo([centerLat, centerLng], zoom, { duration: 1.5 });
          }
        }
      }, [centerLat, centerLng, zoom]);

      useEffect(() => {
        if (!layerGroup.current) return;
        layerGroup.current.clearLayers();
        markers.forEach(m => {
          const color = m.color || '#3b82f6'; 
          L.circle([m.lat, m.lng], { color: color, fillColor: color, fillOpacity: 0.35, weight: 2, radius: m.radius }).addTo(layerGroup.current);
          const htmlIcon = L.divIcon({ className: 'custom-pin', html: `<div style="background-color: ${color}; color: white; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.4); font-size: 16px; transform: translateY(-5px);">${m.rank}</div>`, iconSize: [34, 34], iconAnchor: [17, 17] });
          const marker = L.marker([m.lat, m.lng], { icon: htmlIcon }).addTo(layerGroup.current);
          if (m.name) marker.bindPopup(`<div dir="rtl" class="font-sans font-bold text-sm" style="color: ${color}">${m.rank}. ${m.name}</div>`);
        });
      }, [markers]);

      useEffect(() => {
        if (!poiLayerGroup.current) return;
        poiLayerGroup.current.clearLayers();
        pois.forEach(p => {
           const circleMarker = L.circleMarker([p.lat, p.lng], { radius: 8, fillColor: p.color, color: '#ffffff', weight: 2, opacity: 1, fillOpacity: 0.95 }).addTo(poiLayerGroup.current);
           if (p.name) circleMarker.bindTooltip(`<div dir="rtl" class="font-sans text-xs font-bold px-2 py-1">${p.name}</div>`, { direction: 'top', offset: [0, -4], className: 'poi-tooltip', sticky: true });
        });
      }, [pois]);

      useEffect(() => { if (mapRef.current) mapRef.current.style.cursor = interactiveCursor ? 'crosshair' : ''; }, [interactiveCursor]);

      useEffect(() => {
        const handleResize = () => mapInstance.current?.invalidateSize();
        window.addEventListener('resize', handleResize);
        setTimeout(handleResize, 300);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      return <div ref={mapRef} className="w-full h-full z-0" />;
    }

    // --- Render App ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
